# .github/workflows/samples-ci.yml — build + run every sample's .e2e.yaml suite
#
# Triggers: push and pull_request to main, plus manual dispatch.
#
# Each sample gets its own matrix job (separate runners, so no DCP/port
# contention between them) that:
#   1. checks out this repo,
#   2. sets up the pinned .NET SDK (global.json),
#   3. bootstraps the pinned vouchfx engine commit and builds its CLI,
#   4. builds the sample's Docker image and runs its suite through the CLI,
#   5. uploads the JUnit/HTML reports as an artifact, win or lose.
#
# Within a single machine, scripts/run-sample.sh only ever runs one sample at a
# time (see docs/RUNNING.md) — Aspire/DCP topologies collide on shared
# resources when run concurrently. The matrix below sidesteps that by giving
# each sample its own isolated runner rather than by running them in parallel
# on one host.

name: Samples CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  sample:
    name: ${{ matrix.sample }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # Image pulls (Postgres/Kafka/etc.), Aspire/DCP startup (~20s per
    # resource), and the heavier samples' own dependencies (e.g. SQL Server)
    # make this slower than a typical unit-test job — 25 minutes leaves
    # comfortable headroom without masking a genuinely hung suite.
    timeout-minutes: 25

    strategy:
      fail-fast: false
      # Four matrix entries, four isolated runners — full fan-out is safe
      # (see the file header: the CI matrix, not this value, is what keeps
      # samples from colliding on shared Aspire/DCP resources).
      max-parallel: 4
      matrix:
        sample:
          - orders-dotnet
          - inventory-python
          - payments-java
          - ledger-jsonrpc

    steps:
      - name: Checkout vouchfx-samples
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up .NET SDK (reads global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json

      - name: Bootstrap engine CLI (pinned commit)
        run: bash scripts/bootstrap.sh

      - name: Run sample suite (${{ matrix.sample }})
        run: bash scripts/run-sample.sh ${{ matrix.sample }}

      - name: Upload reports (${{ matrix.sample }})
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reports-${{ matrix.sample }}
          path: out/
          if-no-files-found: warn
